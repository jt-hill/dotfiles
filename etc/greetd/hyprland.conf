# Minimal Hyprland config for greetd/regreet greeter session
# This runs as the greeter user — keep it self-contained

# External monitor (ASUS PG278Q via TB dock, EDID override in firmware)
monitor = DP-1, 2560x1440@120, 0x0, 1

# Laptop display as fallback when undocked
monitor = eDP-1, preferred, auto, 1.666667

# Any other monitor
monitor = , preferred, auto, 1

# Prefer external: bind all workspaces there when available
workspace = 1, monitor:DP-1, default:true

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
}

input {
    kb_layout = us
}

# Launch regreet
exec-once = regreet; hyprctl dispatch exit
