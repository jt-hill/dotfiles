# Hypridle Configuration
# Replacement for swayidle

general {
    lock_cmd = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd = hyprctl dispatch dpms on
}

# Screen dim after 5 minutes (skip if docked — laptop screen is off/irrelevant)
listener {
    timeout = 300
    on-timeout = grep -q docked "${XDG_RUNTIME_DIR:-/tmp}/hypr-dock-mode" 2>/dev/null || brightnessctl -s set 30%
    on-resume = brightnessctl -r
}

# Lock screen after 10 minutes (skip if docked with lid closed — no one to see the lock)
listener {
    timeout = 600
    on-timeout = loginctl lock-session
}

# Turn off display after 15 minutes
listener {
    timeout = 900
    on-timeout = hyprctl dispatch dpms off
    on-resume = hyprctl dispatch dpms on
}
