# Hyprland Configuration
# Ported from Sway config
# Read `man hyprland.conf` for complete reference


# XWayland — render at native resolution, let Hyprland handle scaling
# Fixes blurry/grainy XWayland apps (Discord, etc.) on fractional scales
xwayland {
    force_zero_scaling = true
}

# Source modular config files
source = ~/.config/hypr/environments.conf
source = ~/.config/hypr/monitors.conf
source = ~/.config/hypr/input.conf
source = ~/.config/hypr/theme.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/keybinds.conf
source = ~/.config/hypr/autostart.conf

