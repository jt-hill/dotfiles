# Monitor Configuration

# ASUS PG278Q ROG Swift via Thunderbolt dock (2560x1440, G-Sync)
# 1.07 scaling is the closest valid to 1.1
# EDID override required: dock doesn't pass through EDID properly
# See /lib/firmware/edid/pg278q.bin and kernel cmdline
monitor = DP-1, 2560x1440@120, 0x0, 1.07

# ThinkPad built-in display (1.666667 is closest valid to 1.75)
# dock-mode.sh manages enabling/disabling based on lid + dock state
monitor = eDP-1, preferred, auto, 1.666667

# Fallback for any other monitor
monitor = , preferred, auto, 1

# Default workspace binding — all on external when docked
workspace = 1, monitor:DP-1, default:true
workspace = 2, monitor:DP-1
workspace = 3, monitor:DP-1
workspace = 4, monitor:DP-1
workspace = 5, monitor:DP-1
workspace = 6, monitor:DP-1
workspace = 7, monitor:DP-1
workspace = 8, monitor:DP-1
workspace = 9, monitor:DP-1
workspace = 10, monitor:DP-1

# Lid switch: auto-detect mode based on lid + dock state
bindl = , switch:on:Lid Switch, exec, ~/.config/hypr/scripts/dock-mode.sh auto
bindl = , switch:off:Lid Switch, exec, ~/.config/hypr/scripts/dock-mode.sh auto
